description: '大喜利お題生成プロンプト評価'

prompts:
  - file://prompts/v1-current.txt
  - file://prompts/v2-no-redundant-req.txt
  - file://prompts/v3-dedup-examples.txt

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 1.0

tests:
  - description: 'カテゴリなし・難易度なし（ベーシック）'
    vars:
      category_instruction: ''
      difficulty_instruction: ''

  - description: '日常カテゴリ・普通難易度'
    vars:
      category_instruction: '【カテゴリ指定】日常生活の何気ない場面や出来事を題材にした大喜利のお題を作成してください。'
      difficulty_instruction: '【難易度設定】少し考える必要がある、適度にひねりの効いたお題にしてください。'

  - description: '仕事カテゴリ・高難度'
    vars:
      category_instruction: '【カテゴリ指定】仕事や職業を題材にした大喜利のお題を作成してください。'
      difficulty_instruction: '【難易度設定】高度な発想力や創造性が必要な、上級者向けのお題にしてください。'

  - description: 'ファンタジーカテゴリ'
    vars:
      category_instruction: '【カテゴリ指定】ファンタジーや空想的な世界を題材にした大喜利のお題を作成してください。'
      difficulty_instruction: ''

evaluateOptions:
  maxConcurrency: 3
